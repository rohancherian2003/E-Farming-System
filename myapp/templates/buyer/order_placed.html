<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Placed</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .order-container {
      background: #ffffff;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      padding: 20px 30px;
      max-width: 500px;
      text-align: center;
      color: #333333;
    }
    .order-container h1 {
      color: #4caf50;
      margin: 10px 0;
    }
    .order-container p {
      font-size: 16px;
      line-height: 1.5;
      margin: 10px 0;
    }
    .order-details {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
    }
    .order-details h2 {
      font-size: 18px;
      margin-bottom: 10px;
      color: #555;
    }
    .order-details ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    .order-details ul li {
      font-size: 14px;
      color: #666;
      margin: 5px 0;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      background: #4caf50;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      margin: 10px 5px;
      font-size: 16px;
      transition: 0.3s;
    }
    .btn:hover {
      background: #45a049;
    }
    .btn-secondary {
      background: #2196f3;
    }
    .btn-secondary:hover {
      background: #1e88e5;
    }
  </style>
</head>
<body>
  <div class="order-container">
    <h1>🎉 Order Placed Successfully!</h1>
    <p>Thank you for your purchase! Your order has been placed successfully.</p>
    <div class="order-details">
      <h2>Order Details</h2>
      <ul>
        
        <li><strong>Estimated Delivery:</strong> 3-5 Business Days</li>
      </ul>
    </div>
    <a href="/user/" class="btn">Back to Home</a>
    <a href="/orders/" class="btn btn-secondary">View Orders</a>
  </div>
</body>
</html>
