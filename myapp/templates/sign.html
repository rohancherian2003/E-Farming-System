<!DOCTYPE html>
<html lang="en" >
{% load static %}
<head>
  <meta charset="UTF-8">
  <title>Sign up / Login Page</title>
  <link rel="stylesheet" href="./style.css">

</head>
<body>
<!-- partial:index.partial.html -->
<!DOCTYPE html>
<html>
<head>
	<title>Slide Navbar</title>
	<link rel="stylesheet" type="text/css" href="{% static 'sign/style.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
</head>
<body>
	<div class="main">  	
		<input type="checkbox" id="chk" aria-hidden="true">

			<div class="signup">
				<form method="post" action="/signup/">
				{% csrf_token %}
					<label for="chk" aria-hidden="true">Sign up</label>
					<input
					type="text"
					name="name"
					placeholder="Full name"
					class="form-control"
					required
					pattern="[A-Za-z\s]+"
					title="Name can only contain letters.">
					<input
    type="email"
    name="email"
    placeholder="Email"
    class="form-control"
    required
    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
    title="Please enter a valid email address (e.g., user@example.com)">
					<input type="password" name="pword" placeholder="Password" required="">
					<button type="submit">Sign up</button>
				</form>
			</div>

			<div class="login">
				<form method="post" action="/signin/"onsubmit="return validateLogin(event)">
				{% csrf_token %}
					<label for="chk" aria-hidden="true">Login</label>
					<input
    type="email"
    name="email"
    placeholder="Email"
    class="form-control"
    required
    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
    title="Please enter a valid email address (e.g., user@example.com)">
					<input type="password" name="pword" placeholder="Password" required="">
					<button type="submit">Login</button>
				</form>
			</div>
	</div>
</body>
{% if sub == 'Success' %}
    <script>alert("Registration Success")</script>
    {% endif %}
	{% if msg == 'Falied' %}
    <script>alert("Invalid email or password")</script>
    {% endif %}
</html>

<!-- partial -->
  
</body>
</html>
